apiVersion: v1
kind: Namespace
metadata:
  name: docker-tracker
---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: docker-tracker
  namespace: docker-tracker
---
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: docker-tracker-secret
  namespace: docker-tracker
rules:
  - apiGroups: [""]
    resources: ["secrets"]
    resourceNames: ["docker-tracker-credentials"]
    verbs: ["get", "update", "patch", "delete"]
  - apiGroups: [""]
    resources: ["secrets"]
    verbs: ["create"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: docker-tracker-secret
  namespace: docker-tracker
subjects:
  - kind: ServiceAccount
    name: docker-tracker
    namespace: docker-tracker
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: Role
  name: docker-tracker-secret
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: docker-tracker
  namespace: docker-tracker
spec:
  replicas: 1
  selector:
    matchLabels: {app.kubernetes.io/name: docker-tracker}
  template:
    metadata:
      labels: {app.kubernetes.io/name: docker-tracker}
    spec:
      serviceAccountName: docker-tracker
      automountServiceAccountToken: true
      securityContext:
        runAsNonRoot: true
        seccompProfile: {type: RuntimeDefault}
      containers:
        - name: docker-tracker
          image: harbor.mlinarik.com/mlinarik/docker-hub-manager:v0.1.1
          imagePullPolicy: IfNotPresent
          ports:
            - {name: http, containerPort: 8080, protocol: TCP}
          env:
            - name: POD_NAMESPACE
              valueFrom: {fieldRef: {fieldPath: metadata.namespace}}
            - {name: SECRET_NAME, value: docker-tracker-credentials}
          readinessProbe: {httpGet: {path: /healthz, port: http}, initialDelaySeconds: 2, periodSeconds: 10}
          livenessProbe: {httpGet: {path: /healthz, port: http}, initialDelaySeconds: 10, periodSeconds: 20}
          resources:
            requests: {cpu: 25m, memory: 32Mi}
            limits: {cpu: 500m, memory: 128Mi}
          securityContext:
            allowPrivilegeEscalation: false
            capabilities: {drop: ["ALL"]}
            readOnlyRootFilesystem: true
---
apiVersion: v1
kind: Service
metadata:
  name: docker-tracker
  namespace: docker-tracker
  annotations:
    # Optional: pin an address from your MetalLB pool.
    # metallb.io/loadBalancerIPs: 192.168.1.240
spec:
  type: LoadBalancer
  selector: {app.kubernetes.io/name: docker-tracker}
  ports:
    - {name: http, port: 80, targetPort: http, protocol: TCP}
